external_components:
  - source: github://gelidusresearch/esphome-secplus-gdo
    components: [ secplus_gdo ]
    refresh: 0s

substitutions:
  id_prefix: grgdo1
  friendly_name: "GRGDO1"
  uart_tx_pin: GPIO22           # J4 Pin 1 or 3 Red CTRL
  uart_rx_pin: GPIO21           # J4 Pin 1 or 3 Red CTRL
  input_obst_pin: GPIO23        # J4 Pin 4 Grey OBST - Hardware based obstruction input option
  dc_open_pin: GPIO18           # J4 Pin 6 Green active-low: dry contact door fully open sensor
  dc_close_pin: GPIO19          # J4 Pin 7 Blue active-low: dry contact door fully closed sensor
  dc_light_pin: GPIO17          # J4 Pin 8 Orange active-low: dry contact light toggle input
  tof_sda_pin: GPIO26           # v1 board=GPIO3 v2(USB-C) board=GPIO26 - depricated
  tof_scl_pin: GPIO25           # v1 board=GPIO1 v2(USB-C) board=GPIO25 - depricated
  i2c_sda_pin: GPIO26           # v1 board=GPIO3 v2(USB-C) board=GPIO25 - Optional I2C pins for AHT/ENS160 or other I2C sensors
  i2c_scl_pin: GPIO25           # v1 board=GPIO1 v2(USB-C) board=GPIO26 - Optional I2C pins for AHT/ENS160 or other I2C sensors
  garage_door_cover_name: Garage Door
  garage_light_name: Garage Light
  garage_openings_name: Garage Openings
  garage_lock_name: Lock
  garage_motion_name: Motion
  garage_obstruction_name: Obstruction
  garage_motor_name: Motor
  garage_button_name: Wall Button
  garage_sync_name: Synced


esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

esphome:
  name: ${id_prefix}
  friendly_name: ${friendly_name}
  project:
    name: "Gelidus Research.Garage Door Controller"
    version: "1.0"
  platformio_options:
    build_flags:
      - -Wl,--wrap=esp_panic_handler
  on_boot:
    - priority: 800
      then:
        - lambda: id(${id_prefix}).start_gdo();


wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: ${friendly_name}
    password: ""
    ap_timeout: 15s

captive_portal:

logger:
  baud_rate: 115200 # Set to 0 for GRGDO1 v1.0 hardware with the VL53L1X sensor

api:

ota:
  platform: esphome

web_server:
  include_internal: true
  version: 3

improv_serial:

safe_mode:

status_led:
  pin: ${status_pin}

secplus_gdo:
  id: ${id_prefix}
  input_gdo_pin: ${uart_rx_pin}
  output_gdo_pin: ${uart_tx_pin}
  input_obst_pin: ${input_obst_pin} # Used to enable physical pin obstruction sensing otherwise usex secplus data
  dc_open_pin: ${dc_open_pin}       # active-low: dry contact door fully open sensor
  dc_close_pin: ${dc_close_pin}     # active-low: dry contact door fully closed sensor
  dc_light_pin: ${dc_light_pin}     # active-low: dry contact light toggle input
  dc_pulse_width_ms: 500       # optional, default 500
  dc_debounce_ms: 50           # optional, default 50

light:
  - platform: secplus_gdo
    name: Garage Door Light
    secplus_gdo_id: ${id_prefix}
    id: gdo_light

cover:
  - platform: secplus_gdo
    name: Garage Door
    secplus_gdo_id: ${id_prefix}
    id: gdo_door

text_sensor:
  - platform: version
    name: ESPHome Version
    hide_timestamp: true

sensor:
  - platform: secplus_gdo
    secplus_gdo_id: ${id_prefix}
    id: gdo_openings
    type: openings
    name: "Garage Door Openings"
    unit_of_measurement: "openings"
    icon: mdi:open-in-app
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Strength"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""

